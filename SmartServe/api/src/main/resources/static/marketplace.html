<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartServe | Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FF6B6B;
            --brand-dark: #1A1C1E;
            --text-dark: #1A1C1E;
            --bg-gray: #F8FAFC;
            --success: #2E7D32;
            --charity-blue: #2D63ED; /* New Brand Color for Charity Features */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; color: var(--text-dark); }

        /* --- Premium Navigation --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 6%; background: white; border-bottom: 1px solid #F1F5F9;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 800; color: var(--brand-dark); text-decoration: none; }
        .logo span { color: var(--brand-primary); }
        
        .nav-right { display: flex; gap: 20px; align-items: center; }

        .refresh-btn {
            background: white; border: 1.5px solid var(--brand-primary); color: var(--brand-primary); 
            padding: 8px 16px; border-radius: 50px; cursor: pointer; font-size: 13px; 
            font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .refresh-btn:hover { background: var(--brand-primary); color: white; }

        .user-profile-pill {
            display: flex; align-items: center; gap: 10px;
            padding: 4px 12px 4px 4px; border-radius: 50px;
            background: #f1f5f9; cursor: pointer; border: 1px solid transparent;
            transition: 0.2s;
        }
        .user-profile-pill:hover { border-color: var(--brand-primary); }
        .user-avatar {
            width: 32px; height: 32px; background: var(--brand-primary);
            border-radius: 50%; color: white; display: flex;
            align-items: center; justify-content: center; font-weight: 800; font-size: 13px;
        }

        .main-content { display: grid; grid-template-columns: 350px 1fr; height: calc(100vh - 76px); }
        .sidebar { padding: 30px; background: var(--bg-gray); overflow-y: auto; border-right: 1px solid #F1F5F9; }
        .grid-section { padding: 40px; overflow-y: auto; }
        
        .home-link { 
            display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none; color: var(--brand-primary); 
            font-weight: 700; font-size: 13px; margin-bottom: 20px;
        }

        /* --- Integrated Search Bar --- */
        .search-container { margin-bottom: 30px; width: 100%; max-width: 600px; position: relative; }
        .marketplace-search { 
            width: 100%; padding: 16px 28px; border-radius: 16px; 
            border: 1px solid #E2E8F0; background: #F8FAFC; 
            font-family: inherit; font-size: 15px; font-weight: 600; outline: none; transition: 0.3s;
        }
        .marketplace-search:focus { 
            border-color: var(--brand-primary); background: white; 
            box-shadow: 0 10px 25px rgba(255,107,107,0.1); 
        }

        .status-msg { font-size: 13px; color: #64748B; font-weight: 600; margin-bottom: 25px; display: flex; align-items: center; gap: 6px; }

        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .food-card { 
            background: white; border-radius: 24px; overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); transition: 0.4s;
            text-decoration: none; color: inherit; border: 1px solid #F1F5F9;
            display: flex; flex-direction: column;
            position: relative;
        }
        .food-card:hover { transform: translateY(-8px); border-color: var(--brand-primary); }
        
        .card-img-wrapper { width: 100%; height: 200px; position: relative; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .category-badge {
            position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.95);
            padding: 6px 14px; border-radius: 12px; font-size: 11px; font-weight: 800;
            text-transform: uppercase; color: var(--brand-primary);
        }

        .card-body { padding: 20px; flex-grow: 1; }
        .card-title { font-size: 19px; font-weight: 800; margin-bottom: 5px; color: var(--brand-dark); display: flex; align-items: center; gap: 6px; }

        .verified-badge-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; background-color: #2D63ED; color: white;
            border-radius: 50%; font-size: 10px; font-weight: bold; flex-shrink: 0;
        }

        .location-text { font-size: 13px; color: #64748B; margin-bottom: 15px; display: flex; align-items: center; gap: 4px; }
        .price-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .discount-price { font-size: 18px; font-weight: 800; color: var(--success); }
        .original-price { font-size: 14px; color: #94A3B8; text-decoration: line-through; }

        .quantity-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 15px; border-top: 1px solid #F1F5F9; margin-top: auto;
        }
        .qty-text { font-size: 13px; font-weight: 700; color: var(--brand-primary); }
        .pickup-tag { font-size: 11px; font-weight: 600; color: #64748B; background: #F1F5F9; padding: 4px 8px; border-radius: 6px; }

        /* --- New Charity Styles --- */
        .charity-connect-overlay {
            padding: 12px;
            background: #fff;
            border-top: 1px solid #F1F5F9;
        }
        .connect-btn {
            width: 100%;
            background: var(--charity-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .connect-btn:hover {
            background: #1a4bc4;
            transform: scale(0.98);
        }
        .role-badge {
            background: var(--charity-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 800;
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">smart<span>serve</span></a>
        <div class="nav-right">
            <button onclick="fetchMarketplace()" class="refresh-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                Refresh Location
            </button>
            
            <div class="user-profile-pill" onclick="window.location.href='index.html'">
                <div class="user-avatar" id="headerAvatar">U</div>
                <span id="userNameHeader" style="font-size: 13px; font-weight: 700;">User</span>
                <span id="roleBadge" class="role-badge" style="display:none;">CHARITY</span>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <aside class="sidebar">
            <div id="userPointsCard" style="background:linear-gradient(135deg, #FF6B6B, #FF8E8E); padding:25px; border-radius:24px; color:white; margin-bottom:30px; box-shadow: 0 10px 20px rgba(255,107,107,0.2);">
                <p style="font-size:11px; font-weight:800; text-transform:uppercase; opacity:0.9;">Impact Points</p>
                <h2 style="font-size:32px; font-weight:800;">1,240</h2>
                <p style="font-size:12px; font-weight:600; margin-top:5px;">Helping the community 🌿</p>
            </div>

            <h3 style="font-size:16px; font-weight:800; margin-bottom:20px;">Top Community Donors</h3>
            <div style="background:white; padding:20px; border-radius:20px; border:1px solid #E2E8F0; margin-bottom:15px;">
                <p style="font-weight:800;">Grand Hyatt Kochi</p>
                <p style="font-size:12px; color:#64748B;">⭐ 4.8 • Bolgatty</p>
            </div>
            <div style="background:white; padding:20px; border-radius:20px; border:1px solid #E2E8F0; margin-bottom:15px;">
                <p style="font-weight:800;">Lulu Convention Center</p>
                <p style="font-size:12px; color:#64748B;">⭐ 4.9 • Edappally</p>
            </div>
        </aside>

        <main class="grid-section">
            <a href="index.html" class="home-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Back to Dashboard
            </a>

            <div class="search-container">
                <input type="text" class="marketplace-search" aria-label="Search listings" id="searchInput" oninput="handleSearch()" placeholder="Search for food, restaurants, or events (e.g. 'Wedding')...">
            </div>

            <p class="status-msg" id="statusLabel">Initializing SmartServe Location...</p>

            <div class="food-grid" id="foodGrid"></div>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:8080/api/food"; 
        const KOCHI_LAT = 10.015;
        const KOCHI_LON = 76.341;
        let allItems = [];
        let isCharity = false;

        function initUser() {
            const sid = localStorage.getItem('ss_id');
            const sname = localStorage.getItem('ss_name');
            const semail = localStorage.getItem('ss_email');
            const srole = localStorage.getItem('ss_role'); // Assuming you set this during login

            if (sid) {
                const displayName = sname || (semail ? semail.split('@')[0] : 'User');
                const headerName = document.getElementById('userNameHeader');
                const headerAvatar = document.getElementById('headerAvatar');
                const roleBadge = document.getElementById('roleBadge');

                if(headerName) headerName.innerText = displayName;
                if(headerAvatar) headerAvatar.innerText = displayName.charAt(0).toUpperCase();
                
                if (srole === 'charity') {
                    isCharity = true;
                    if(roleBadge) roleBadge.style.display = 'inline-block';
                }
            }
        }

        async function connectAsCharity(event, itemId) {
            event.preventDefault();
            event.stopPropagation();
            
            const charityId = localStorage.getItem('ss_id');
            if (!charityId) {
                alert("Please log in to connect.");
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${itemId}/connect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ charityId: charityId })
                });

                if (response.ok) {
                    alert("Connection Successful! Check your history for the Secure Handshake OTP.");
                    window.location.href = "history.html";
                } else {
                    alert("Failed to connect. Item might already be claimed.");
                }
            } catch (error) {
                console.error("Error connecting:", error);
                alert("Server error. Is Spring Boot running?");
            }
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const statusLabel = document.getElementById('statusLabel');

            const filteredResults = allItems.filter(item => {
                const titleMatch = item.title ? item.title.toLowerCase().includes(query) : false;
                const addressMatch = item.addressText ? item.addressText.toLowerCase().includes(query) : false;
                const categoryMatch = (item.category && item.category.name) ? item.category.name.toLowerCase().includes(query) : false;
                
                return titleMatch || addressMatch || categoryMatch;
            });

            renderCards(filteredResults);

            if (query !== "") {
                statusLabel.innerText = `Found ${filteredResults.length} matches for "${query}"`;
            } else {
                statusLabel.innerText = "Nearby surplus sorted by your location 📍";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(1);
        }

        async function fetchMarketplace() {
            const grid = document.getElementById('foodGrid');
            const statusLabel = document.getElementById('statusLabel');
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px;">Calculating distance to surplus...</p>';

            navigator.geolocation.getCurrentPosition(async (position) => {
                let userLat = position.coords.latitude;
                let userLon = position.coords.longitude;

                if (userLat < 9.5 || userLat > 10.5) {
                    userLat = KOCHI_LAT;
                    userLon = KOCHI_LON;
                    statusLabel.innerText = "Showing items near Kochi City Center 📍";
                } else {
                    statusLabel.innerText = "Nearby surplus sorted by your location 📍";
                }

                try {
                    const response = await fetch(API_URL);
                    allItems = await response.json();
                    
                    allItems = allItems.map(item => {
                        const dist = calculateDistance(userLat, userLon, Number(item.latitude), Number(item.longitude));
                        return { ...item, distance: dist ? parseFloat(dist) : 9.5 };
                    });

                    allItems.sort((a, b) => a.distance - b.distance);
                    renderCards(allItems);
                } catch (error) {
                    handleFetchError(error);
                }
            }, (geoError) => {
                statusLabel.innerText = "Location denied. Using Kochi Default.";
                loadWithFixedLocation(KOCHI_LAT, KOCHI_LON);
            });
        }

        async function loadWithFixedLocation(lat, lon) {
            try {
                const response = await fetch(API_URL);
                allItems = await response.json();
                allItems = allItems.map(item => {
                    const dist = calculateDistance(lat, lon, Number(item.latitude), Number(item.longitude));
                    return { ...item, distance: dist ? parseFloat(dist) : 9.5 };
                });
                allItems.sort((a, b) => a.distance - b.distance);
                renderCards(allItems);
            } catch (e) { handleFetchError(e); }
        }

        function renderCards(items) {
            const grid = document.getElementById('foodGrid');
            if(items.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #64748B; padding: 40px;">No items found matching your search.</p>`;
                return;
            }

            grid.innerHTML = items.map(item => {
                let rawImageUrl = item.imageUrl || '';
                let finalFullUrl = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500';
                
                if (rawImageUrl) {
                    if (rawImageUrl.startsWith('http')) finalFullUrl = rawImageUrl;
                    else if (rawImageUrl.startsWith('/uploads/')) finalFullUrl = `http://localhost:8080${rawImageUrl}`;
                    else finalFullUrl = `http://localhost:8080/uploads/${rawImageUrl}`;
                }

                const badgeHtml = item.donorApproved ? 
                    `<span class="verified-badge-icon" title="Verified Donor">✓</span>` : '';

                // Add the Charity Connect Button if the user is a charity
                const charityButton = isCharity ? `
                    <div class="charity-connect-overlay">
                        <button class="connect-btn" onclick="connectAsCharity(event, ${item.id})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
                            Connect for Donation
                        </button>
                    </div>
                ` : '';

                return `
                <div class="food-card">
                    <a href="item-details.html?id=${item.id}" style="text-decoration:none; color:inherit;">
                        <div class="card-img-wrapper">
                            <div class="category-badge">${item.distance} km away</div>
                            <img src="${finalFullUrl}" class="card-img" alt="" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500'">
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${item.title} ${badgeHtml}</h3>
                            <div class="location-text">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                ${item.addressText ? item.addressText.split(',')[0] : 'Kochi'}
                            </div>
                            <div class="price-container">
                                <span class="discount-price">₹${item.discountedPrice}</span>
                                <span class="original-price">₹${item.originalPrice}</span>
                            </div>
                            <div class="quantity-row">
                                <span class="qty-text">${item.quantity} left</span>
                                <span class="pickup-tag">${item.pickupTime || 'Today'}</span>
                            </div>
                        </div>
                    </a>
                    ${charityButton}
                </div>`;
            }).join('');
        }

        function handleFetchError(error) {
            document.getElementById('foodGrid').innerHTML = `<p style="color:red; grid-column:1/-1; text-align:center; padding: 40px;">Failed to connect to server. Please ensure Spring Boot is running.</p>`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initUser();
            fetchMarketplace();
        });
    </script>
</body>
</html>
